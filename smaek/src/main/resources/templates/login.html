<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login — SMAEK</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --purple: #6c63ff; --purple2: #857aff; --purple-light: #ede9ff; --bg: #f1f3f8; --white: #ffffff; --border: #e5e7eb; --text: #1a1a2e; --text2: #6b7280; --text3: #9ca3af; --font: 'Poppins', sans-serif; --red: #ef4444; --green: #22c55e; }
    body { font-family: var(--font); background: linear-gradient(135deg, #6c63ff 0%, #9f7aea 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--white); border-radius: 24px; box-shadow: 0 24px 60px rgba(0,0,0,.2); padding: 40px; width: 400px; max-width: 95vw; }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; justify-content: center; }
    .logo-icon { width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, var(--purple), #9f7aea); display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .logo-text .name { font-size: 20px; font-weight: 800; color: var(--text); }
    .logo-text .sub { font-size: 11px; color: var(--text3); }
    h2 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    p.sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
    .form-field { margin-bottom: 16px; }
    .form-field label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
    .form-field input { width: 100%; padding: 12px 14px; background: #f9fafb; border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; }
    .form-field input:focus { border-color: var(--purple); background: #fff; box-shadow: 0 0 0 3px rgba(108,99,255,.1); }
    .btn-login { width: 100%; padding: 13px; background: var(--purple); color: #fff; border: none; border-radius: 12px; font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s; margin-top: 8px; }
    .btn-login:hover { background: var(--purple2); }
    .alert { padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; }
    .alert-error { background: rgba(239,68,68,.1); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
    .alert-success { background: rgba(34,197,94,.1); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon"></div>
      <div class="logo-text">
        <div class="name">SMAEK</div>
        <div class="sub">Sistem Manajemen Ekskul</div>
      </div>
    </div>
    <h2>Masuk ke Sistem</h2>
    <p class="sub">Silakan login dengan akun Anda</p>
    <div th:if="${param.error}" class="alert alert-error">Username atau password salah!</div>
    <div th:if="${param.logout}" class="alert alert-success">Berhasil logout!</div>
    <form th:action="@{/login}" method="post">
      <div class="form-field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Masukkan username" required autofocus/>
      </div>
      <div class="form-field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Masukkan password" required/>
      </div>
      <button type="submit" class="btn-login">Masuk</button>
    </form>
  </div>
</body>
</html>
