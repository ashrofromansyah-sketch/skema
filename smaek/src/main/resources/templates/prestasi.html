<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Prestasi — SMAEK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #6c63ff; --purple2: #857aff; --purple-light: #ede9ff;
      --purple-soft: rgba(108,99,255,0.1); --accent2: #ff6584;
      --green: #22c55e; --yellow: #f59e0b; --red: #ef4444; --blue: #3b82f6;
      --bg: #f1f3f8; --white: #ffffff; --border: #e5e7eb;
      --text: #1a1a2e; --text2: #6b7280; --text3: #9ca3af;
      --font: 'Poppins', sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
    .page-top { background: linear-gradient(135deg, var(--purple), #9f7aea); padding: 28px 36px 60px; color: #fff; }
    .page-top h1 { font-size: 22px; font-weight: 700; }
    .page-top p  { font-size: 13px; opacity: .8; margin-top: 4px; }
    .page-top-actions { display: flex; gap: 10px; margin-top: 16px; }
    .page-body { padding: 0 36px 36px; margin-top: -40px; }
    .btn { padding: 10px 18px; border-radius: 10px; font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
    .btn-primary { background: var(--purple); color: #fff; box-shadow: 0 4px 12px rgba(108,99,255,.3); }
    .btn-white { background: #fff; color: var(--purple); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
    .btn-danger { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: var(--red); }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 8px; }
    .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 22px; }
    .stat-card { background: var(--white); border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06); border: 1px solid var(--border); padding: 20px 22px; position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--purple), var(--accent2)); }
    .stat-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
    .stat-value { font-size: 30px; font-weight: 700; color: var(--text); }
    .stat-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 36px; opacity: .12; }
    .card { background: var(--white); border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06); border: 1px solid var(--border); }
    .table-wrap { overflow-x: auto; border-radius: 16px; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; padding: 12px 18px; background: #fafafa; border-bottom: 1px solid var(--border); text-align: left; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--purple-soft); }
    tbody td { padding: 13px 18px; font-size: 13px; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .search-box { flex: 1; min-width: 200px; position: relative; }
    .search-box input { width: 100%; padding: 10px 14px 10px 38px; background: var(--white); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; }
    .search-box input:focus { border-color: var(--purple); }
    .search-box .si { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); }
    select.sel { padding: 10px 14px; background: var(--white); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; cursor: pointer; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-purple { background: var(--purple-light); color: var(--purple); }
    .badge-green  { background: rgba(34,197,94,.12); color: var(--green); }
    .badge-yellow { background: rgba(245,158,11,.1); color: var(--yellow); }
    .badge-blue   { background: rgba(59,130,246,.1); color: var(--blue); }
    .badge-gray   { background: #f3f4f6; color: var(--text3); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; padding: 20px; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--white); border-radius: 20px; box-shadow: 0 24px 60px rgba(0,0,0,.2); padding: 32px; width: 520px; max-width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 22px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-field { margin-bottom: 14px; }
    .form-field label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
    .form-field input, .form-field select, .form-field textarea { width: 100%; padding: 11px 14px; background: #f9fafb; border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; }
    .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--purple); background: #fff; }
    .form-field textarea { resize: vertical; min-height: 80px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 999; background: var(--white); border-radius: 12px; padding: 14px 20px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 32px rgba(0,0,0,.15); transform: translateY(16px); opacity: 0; transition: all .25s; border-left: 4px solid var(--green); }
    .toast.show { transform: translateY(0); opacity: 1; }
    .empty { text-align: center; padding: 50px 20px; }
    .empty p { font-size: 13px; color: var(--text3); }
  </style>
</head>
<body>

  <div class="page-top">
    <h1>Prestasi</h1>
    <p>Rekap pencapaian dan tingkat prestasi anggota</p>
    <div class="page-top-actions">
      <button class="btn btn-white" onclick="openModal('modalAdd')">+ Tambah Prestasi</button>
    </div>
  </div>

  <div class="page-body">

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon"></div>
        <div class="stat-label">Total Prestasi</div>
        <div class="stat-value" th:text="${prestasiList.size()}">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"></div>
        <div class="stat-label">Total Poin</div>
        <div class="stat-value" th:text="${totalPoin}">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"></div>
        <div class="stat-label">Total Anggota</div>
        <div class="stat-value" th:text="${anggotaList.size()}">0</div>
      </div>
    </div>

    <!-- Toolbar Filter -->
    <form th:action="@{/prestasi}" method="get">
      <div class="toolbar">
        <div class="search-box">
          <span class="si"></span>
          <input type="text" name="q" th:value="${q}" placeholder="Cari prestasi atau nama..."/>
        </div>
        <select class="sel" name="tingkat" onchange="this.form.submit()">
          <option value="">Semua Tingkat</option>
          <option value="Sekolah"       th:selected="${tingkat == 'Sekolah'}">Sekolah</option>
          <option value="Kecamatan"     th:selected="${tingkat == 'Kecamatan'}">Kecamatan</option>
          <option value="Kota"          th:selected="${tingkat == 'Kota'}">Kota</option>
          <option value="Provinsi"      th:selected="${tingkat == 'Provinsi'}">Provinsi</option>
          <option value="Nasional"      th:selected="${tingkat == 'Nasional'}">Nasional</option>
          <option value="Internasional" th:selected="${tingkat == 'Internasional'}">Internasional</option>
        </select>
        <button type="submit" class="btn btn-primary">Cari</button>
      </div>
    </form>

    <!-- Tabel Prestasi -->
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nama</th>
              <th>Judul</th>
              <th>Tanggal</th>
              <th>Tingkat</th>
              <th>Poin</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${prestasiList.isEmpty()}">
              <td colspan="7">
                <div class="empty"><p> Belum ada prestasi</p></div>
              </td>
            </tr>
            <tr th:each="p, i : ${prestasiList}">
              <td style="color:var(--text3)" th:text="${i.count}"></td>
              <td><strong th:text="${p.nama}"></strong></td>
              <td th:text="${p.judul}"></td>
              <td style="font-size:12px;color:var(--text3)" th:text="${p.tanggal}"></td>
              <td>
                <span class="badge"
                  th:classappend="${p.tingkat == 'Internasional' or p.tingkat == 'Nasional'} ? 'badge-green' : (${p.tingkat == 'Provinsi'} ? 'badge-yellow' : (${p.tingkat == 'Kota' or p.tingkat == 'Kecamatan'} ? 'badge-blue' : 'badge-gray'))"
                  th:text="${p.tingkat}">
                </span>
              </td>
              <td style="font-size:14px;font-weight:700;color:var(--purple)" th:text="${p.poin}"></td>
              <td>
                <div style="display:flex;gap:6px">
                  <button class="btn btn-ghost btn-sm"
                    th:onclick="'editPrestasi(' + ${p.id} + ', ' + ${p.anggotaId} + ', \'' + ${p.judul} + '\', \'' + ${p.tanggal} + '\', \'' + ${p.tingkat} + '\', ' + ${p.poin} + ', \'' + ${p.keterangan} + '\')'">
                    Edit
                  </button>
                  <form th:action="@{/prestasi/hapus/{id}(id=${p.id})}" method="post" style="display:inline"
                    onsubmit="return confirm('Hapus prestasi ini?')">
                    <button type="submit" class="btn btn-danger btn-sm">Hapus</button>
                  </form>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal Tambah/Edit -->
  <div class="modal-overlay" id="modalAdd" onclick="if(event.target===this)closeModal('modalAdd')">
    <div class="modal">
      <h2 id="modalTitle">Tambah Prestasi</h2>
      <form th:action="@{/prestasi/simpan}" method="post">
        <input type="hidden" id="editId" name="id"/>
        <div class="form-field">
          <label>Anggota</label>
          <select id="fAnggota" name="anggotaId">
            <option th:each="a : ${anggotaList}"
                    th:value="${a.id}"
                    th:text="${a.nama} + ' (' + ${a.kelas} + ')'">
            </option>
          </select>
        </div>
        <div class="form-field">
          <label>Judul Prestasi</label>
          <input type="text" id="fJudul" name="judul" placeholder="Contoh: Juara 1 Lomba Seni" required/>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>Tanggal</label>
            <input type="date" id="fTanggal" name="tanggal" required/>
          </div>
          <div class="form-field">
            <label>Tingkat</label>
            <select id="fTingkat" name="tingkat" onchange="autoPoin()">
              <option value="Sekolah">Sekolah</option>
              <option value="Kecamatan">Kecamatan</option>
              <option value="Kota">Kota</option>
              <option value="Provinsi">Provinsi</option>
              <option value="Nasional">Nasional</option>
              <option value="Internasional">Internasional</option>
            </select>
          </div>
        </div>
        <div class="form-field">
          <label>Poin</label>
          <input type="number" id="fPoin" name="poin" value="100"/>
          <div style="font-size:10px;color:var(--text3);margin-top:4px">
            Sekolah=50 · Kecamatan=75 · Kota=100 · Provinsi=200 · Nasional=500 · Internasional=1000
          </div>
        </div>
        <div class="form-field">
          <label>Keterangan</label>
          <textarea id="fKet" name="keterangan" placeholder="Keterangan tambahan..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal('modalAdd')">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" th:text="${successMsg}"></div>

  <script>
    const POIN = {Sekolah:50, Kecamatan:75, Kota:100, Provinsi:200, Nasional:500, Internasional:1000};

    function openModal(id)  { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function autoPoin() {
      const t = document.getElementById('fTingkat').value;
      document.getElementById('fPoin').value = POIN[t] || 100;
    }

    function editPrestasi(id, anggotaId, judul, tanggal, tingkat, poin, ket) {
      document.getElementById('modalTitle').textContent = 'Edit Prestasi';
      document.getElementById('editId').value    = id;
      document.getElementById('fAnggota').value  = anggotaId;
      document.getElementById('fJudul').value    = judul;
      document.getElementById('fTanggal').value  = tanggal !== 'null' ? tanggal : '';
      document.getElementById('fTingkat').value  = tingkat;
      document.getElementById('fPoin').value     = poin;
      document.getElementById('fKet').value      = ket !== 'null' ? ket : '';
      openModal('modalAdd');
    }

    window.onload = function() {
      const t = document.getElementById('toast');
      if (t && t.textContent.trim()) {
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
      }
      // Set tanggal default hari ini
      const today = new Date().toISOString().split('T')[0];
      if (!document.getElementById('fTanggal').value) {
        document.getElementById('fTanggal').value = today;
      }
    }
  </script>
</body>
</html>
